# events
 LAFI_flavor_events.1.tt: "极难战神？"
 LAFI_flavor_events.1.desc: "这个游戏太简单了，需要加点难度吗？\n\n以下修正会与游戏难度设置叠加。\n\n可触发修正会造成一定的性能影响。\n\n§R注意，该事件仅触发一次，一经选择无法撤销。§!"
 LAFI_flavor_events.1.a: "还是算了"
 LAFI_flavor_events.1.b: "我将凯旋"
 LAFI_flavor_events.1.b.tt: "ai将获得与极难难度等效的可触发修正。"
 LAFI_flavor_events.1.c: "我觉得我也是ai"
 LAFI_flavor_events.1.c.tt: "ai与玩家将获得与极难难度等效的可触发修正。"
 LAFI_flavor_events.1.d: "我想这个游戏太难了..."
 LAFI_flavor_events.1.d.tt: "玩家将获得与极难难度等效的可触发修正。"
 LAFI_flavor_events.2.tt: "无题"
 LAFI_flavor_events.2.desc: "证明自己"
 LAFI_flavor_events.2.a: "我本胶东布衣..."
