 LAFI_flavor_events.3.tt: ""
 LAFI_flavor_events.3.desc: ""
 LAFI_flavor_events.3.a: ""
 LAFI_flavor_events.4.tt: "猪？"
 LAFI_flavor_events.4.desc: "昨夜，卫兵报告称在花园的阴影中瞥见了一个奇怪的身影。到了今晨，卫兵们在花园的树下发现了一头不知从哪来的猪。它旁若无人地趴在一堆凌乱的纸稿上，偶尔用蹄子拨弄着那些密密麻麻的文字。靠近后，侍从能听到这头猪在哼哼“叙事梯阵”、“顶点型多功能”“下如同上”之类叫人半懂不懂的词。当卫兵们试图把它抓走时，这头猪竟然口吐人言，表示愿为[Root.Monarch.GetName]效犬马……不，猪猡之劳。"
 LAFI_flavor_events.4.a: "这是某种启示么？"
 LAFI_flavor_events.4.b: "还是宰了吧（无慈悲）"
 LAFI_flavor_events.5.tt: "玩安本？"
 LAFI_flavor_events.5.desc: "安本好玩。"
 LAFI_flavor_events.5.a: "不玩安本"
 LAFI_flavor_events.5.b: "玩安本"
